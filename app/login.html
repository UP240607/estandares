<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Citas UPA — Demo de login</title>
  <style>
    body { font-family: sans-serif; max-width: 420px; margin: 3rem auto; }
    input { display: block; width: 100%; padding: .5rem; margin: .4rem 0; box-sizing: border-box; }
    button { padding: .5rem 1rem; cursor: pointer; }
    #error { color: #b00020; }
    #saludo { color: #16653f; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Citas UPA</h1>

  <!-- Los IDs (usuario, clave, btn-login, saludo, error) son los que
       buscan los Page Objects de Selenium. -->
  <form id="form-login" onsubmit="return false;">
    <input id="usuario" placeholder="Correo">
    <input id="clave" type="password" placeholder="Contraseña">
    <button id="btn-login" onclick="entrar()">Entrar</button>
  </form>

  <p id="error" style="display:none;"></p>
  <p id="saludo" style="display:none;"></p>

  <script>
    // Credenciales válidas de la demo (coinciden con las diapositivas).
    const VALID_USER = "alumno@upa.edu.mx";
    const VALID_PASS = "Cl4v3UPA";

    function entrar() {
      const u = document.getElementById("usuario").value;
      const c = document.getElementById("clave").value;
      const error = document.getElementById("error");
      const saludo = document.getElementById("saludo");
      error.style.display = "none";
      saludo.style.display = "none";

      // Retardo deliberado (~600 ms) que simula una llamada AJAX.
      // Es lo que obliga a usar ESPERAS EXPLÍCITAS en las pruebas:
      // con time.sleep sería flaky; con WebDriverWait es estable.
      setTimeout(() => {
        let msg = null;
        if (!u)               msg = "El usuario es obligatorio";
        else if (!c)          msg = "La contrasena es obligatoria";
        else if (u !== VALID_USER) msg = "Usuario no existe";
        else if (c !== VALID_PASS) msg = "Contrasena incorrecta";

        if (msg) {
          error.textContent = msg;
          error.style.display = "block";
        } else {
          saludo.textContent = "Bienvenido alumno";
          saludo.style.display = "block";
        }
      }, 600);
    }
  </script>
</body>
</html>
